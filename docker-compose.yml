services:
  backend:
    build:
      context: ./eventhub_backend
    container_name: eventhub-backend
    env_file:
      - ./eventhub_backend/.env
    depends_on:
      - mongodb
    networks:
      - eventhub-network

  frontend:
    build:
      context: ./eventhub_frontend
    container_name: eventhub-frontend
    environment:
      VITE_API_URL: http://nginx/api/v1
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
    networks:
      - eventhub-network

  nginx:
    image: nginx:alpine
    container_name: eventhub-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - eventhub-network

  mongodb:
    image: mongo:7
    container_name: eventhub-mongodb
    volumes:
      - mongodb_data:/data/db
    networks:
      - eventhub-network

networks:
  eventhub-network:
    driver: bridge

volumes:
  mongodb_data:
